name: .NET build and test

on:
  push:
    branches:
      - main
      - refactor/phase-1-structure
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Monthoya.sln

      - name: Build
        run: dotnet build Monthoya.sln --no-restore

      - name: Test
        run: dotnet test Monthoya.Tests --no-build --verbosity normal
